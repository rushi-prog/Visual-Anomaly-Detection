# EfficientAD Configuration
# Student-Teacher distillation + Autoencoder for fast, accurate anomaly detection
# Designed for real-time edge deployment with millisecond-level latency

model:
  name: "EfficientAd"
  teacher_out_channels: 384
  model_size: "small"               # "small" or "medium"
  lr: 0.0001
  weight_decay: 0.00001
  padding: false
  pad_maps: true

data:
  category: "bottle"
  image_size: [256, 256]
  train_batch_size: 1               # EfficientAD typically uses batch_size=1
  eval_batch_size: 1
  num_workers: 4

trainer:
  max_epochs: 70                     # EfficientAD needs more epochs
  accelerator: "auto"
  devices: 1

results_dir: "./results"
